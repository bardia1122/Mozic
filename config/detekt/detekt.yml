# Detekt configuration for Mozic. Builds upon the default rule set
# (buildUponDefaultConfig = true); only deviations are listed here.

build:
  maxIssues: 0

style:
  MagicNumber:
    # Design-system tokens and Compose dimensions use numeric literals by nature;
    # the "no hardcoded values" rule is enforced by review, not by MagicNumber.
    active: false
  ReturnCount:
    active: true
    max: 4
  UnusedPrivateMember:
    active: true

complexity:
  LongMethod:
    # Composable functions are naturally long; keep a generous threshold.
    threshold: 120
  LongParameterList:
    # Domain state/model data classes (e.g. PlayerState) have many fields, but
    # they carry defaults and are constructed by name — not a call-site smell.
    # Threshold nudged to 7 for named-argument data/sample-data builders.
    functionThreshold: 7
    constructorThreshold: 7
    ignoreDefaultParameters: true
  TooManyFunctions:
    active: false

naming:
  FunctionNaming:
    # Composable functions are PascalCase by convention.
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ignoreAnnotated: [ 'Composable' ]
